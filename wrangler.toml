# Multi-tenant meetings Worker for Recall.ai integration.
#
# Per-tenant Durable Objects (MeetingTenantDO) keyed by tenant slug
# (e.g. "erez", "yaron"). Each DO holds that tenant's
# `database_url`, `recall_webhook_secret`, `tenant_key`, and (after calendar
# OAuth) Google refresh_token + channel state + sync_token.
# Adding a new tenant is a single POST to /admin/register.
#
# Per-meeting Durable Objects (MeetingDO) keyed by `meeting:<slug>:<event_id>`
# carry the alarm() that fires Recall bot creation 30s before each meeting.
#
# KV namespace `CALENDAR_ROUTING` is the reverse-lookup `channel_id → tenant`
# (Google push payloads carry only the channel id).
#
# Deploy with:
#   CLOUDFLARE_API_TOKEN=... npx wrangler deploy
#
# Route: https://my-jarvis-meetings-worker.<account>.workers.dev

name = "my-jarvis-meetings-worker"
main = "src/index.ts"
compatibility_date = "2024-11-06"

# Wrangler/esbuild's bundler walks up the directory tree looking for resolution
# markers and finds ~/.pnp.cjs (a Yarn PnP manifest from another project that
# happens to live in $HOME). Aliasing forces it to resolve via the local
# node_modules. nodejs_compat is intentionally NOT enabled — neon serverless
# uses fetch only and doesn't need Node APIs.
[alias]
"@neondatabase/serverless" = "./node_modules/@neondatabase/serverless"

# Public host of this Worker. Used to build the Recall webhook URL when
# starting a bot, plus the Google watch channel address. Override per
# environment if a custom domain is attached.
[vars]
WORKER_PUBLIC_HOST = "my-jarvis-meetings-worker.myjarvis.workers.dev"

# Vexa instance base URL (no trailing slash).
# Pointed at the Fly Machine running Vexa Lite + faster-whisper + relay.
#   VEXA_API_KEY is a secret: `wrangler secret put VEXA_API_KEY`
VEXA_API_URL = "https://my-jarvis-vexa-erez.fly.dev"

[[durable_objects.bindings]]
name = "MEETING_TENANT"
class_name = "MeetingTenantDO"

[[durable_objects.bindings]]
name = "MEETING_DO"
class_name = "MeetingDO"

# Reverse-lookup: `channel:<X-Goog-Channel-Id>` → tenant_slug, plus
# CSRF storage at `csrf:<token>` with TTL.
# TODO: create the namespace and paste the real id here:
#   npx wrangler kv namespace create CALENDAR_ROUTING
[[kv_namespaces]]
binding = "CALENDAR_ROUTING"
id = "9f12cabfa0f94f95b5c5876f8764b8e0"

# Cloudflare Workers AI binding — used by /v1/audio/transcriptions to run
# `@cf/openai/whisper-large-v3-turbo` on Cloudflare's edge GPU farm.
# Vexa Lite calls this proxy instead of running its own faster-whisper on
# our Fly machine, freeing the Fly box of GPU/CPU pressure.
[ai]
binding = "AI"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MeetingTenantDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["MeetingDO"]

# Reconcile cron — every 5 min.
# - Channel renewal at T-24h before Google's 7-day expiry
# - Missed-dispatch DLQ for the at-least-once alarm system
[triggers]
crons = ["*/5 * * * *"]
